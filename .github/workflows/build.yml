name: Build and Publish VSCode Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm run build:prod

      - name: Package VSIX
        run: pnpm run package:vsix

      - name: Publish to VSCode Marketplace
        run: pnpm exec vsce publish --packagePath dist/claude-model-switch.vsix --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        run: pnpm exec ovsx publish dist/claude-model-switch.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        continue-on-error: true

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-model-switch-vsix
          path: dist/claude-model-switch.vsix