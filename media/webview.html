<!DOCTYPE html>
<html lang="{{htmlLang}}">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'nonce-{{nonce}}' {{cssSrc}}; script-src 'nonce-{{nonce}}';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <link rel="stylesheet" nonce="{{nonce}}" href="{{cssUri}}">
</head>
<body data-unnamed="{{unnamed}}" data-fetch-loading="{{fetchModelsLoading}}" data-fetch-success="{{fetchModelsSuccess}}" data-fetch-failed="{{fetchModelsFailed}}" data-base-url-required="{{baseUrlRequired}}" data-select-placeholder="{{selectModelPlaceholder}}" data-search-models="{{searchModels}}" data-no-models-found="{{noModelsFound}}" data-please-fetch-models="{{pleaseFetchModels}}" data-extra-settings-data="{{extraSettingsData}}" data-es-key="{{esKeyPlaceholder}}" data-add-child="{{esAddChild}}" data-add-item="{{esAddItem}}" data-remove="{{esRemove}}" data-type-string="{{esTypeString}}" data-type-number="{{esTypeNumber}}" data-type-boolean="{{esTypeBoolean}}" data-type-null="{{esTypeNull}}" data-type-object="{{esTypeObject}}" data-type-array="{{esTypeArray}}" data-es-json-invalid="{{esJsonInvalid}}" data-es-json-valid="{{esJsonValid}}" data-es-json-synced="{{esJsonSynced}}" data-es-json-applied="{{esJsonApplied}}" data-es-json-not-object="{{esJsonNotObject}}" data-es-import-success="{{importSuccess}}" data-es-global-source="{{globalSource}}" data-es-project-source="{{projectSource}}">

  <div class="import-toolbar">
    <button type="button" class="btn-secondary" id="importProjectBtn">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      {{importFromProject}}
    </button>
    <button type="button" class="btn-secondary" id="importGlobalBtn">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      {{importFromGlobal}}
    </button>
  </div>
  <div class="import-status" id="importStatus" aria-live="polite"></div>

  <div class="card">
    <div class="card-header"><span class="card-title">{{cardConnection}}</span><svg class="card-chevron" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>
    <div class="card-body">
      <div class="field">
        <div class="field-row">
          <label for="ANTHROPIC_AUTH_TOKEN">{{authToken}}</label>
          <div class="input-wrapper">
            <input type="password" id="ANTHROPIC_AUTH_TOKEN" value="{{ANTHROPIC_AUTH_TOKEN}}" />
            <button class="eye-toggle" id="toggleAuthToken" title="{{showHide}}">
              <svg class="icon-eye" viewBox="0 0 24 24" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
              <svg class="icon-eye-off" viewBox="0 0 24 24" width="16" height="16"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.19a3 3 0 1 1-4.24-4.24" fill="none" stroke="currentColor" stroke-width="2"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </div>
          <span class="action-col-spacer" aria-hidden="true"></span>
          <span class="one-million-context-spacer" aria-hidden="true"></span>
        </div>
      </div>

      <div class="field">
        <div class="field-row">
          <label for="ANTHROPIC_BASE_URL">{{baseUrl}}</label>
          <input type="text" id="ANTHROPIC_BASE_URL" value="{{ANTHROPIC_BASE_URL}}" />
          <button class="btn-secondary" id="fetchModelsBtn">{{fetchModels}}</button>
          <span class="one-million-context-spacer" aria-hidden="true"></span>
        </div>
        <div class="models-status" id="modelsStatus" aria-live="polite"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><span class="card-title">{{cardModels}}</span><svg class="card-chevron" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>
    <div class="card-body">
      <div class="field model-field">
        <div class="model-field-row">
          <label for="ANTHROPIC_DEFAULT_HAIKU_MODEL">{{defaultHaikuModel}}</label>
          <input type="text" id="ANTHROPIC_DEFAULT_HAIKU_MODEL" value="{{ANTHROPIC_DEFAULT_HAIKU_MODEL}}" />
          <div class="searchable-select" data-target="ANTHROPIC_DEFAULT_HAIKU_MODEL">
            <input type="text" class="searchable-select-input" placeholder="{{selectModelPlaceholder}}" readonly />
            <div class="searchable-select-dropdown">
              <input type="text" class="searchable-select-search" placeholder="{{searchModels}}" />
              <div class="searchable-select-list"></div>
              <div class="searchable-select-empty">{{noModelsFound}}</div>
            </div>
          </div>
          <button type="button" class="btn-secondary model-speed-test-btn" data-target="ANTHROPIC_DEFAULT_HAIKU_MODEL">{{modelSpeedTest}}</button>
          <span class="one-million-context-spacer" aria-hidden="true"></span>
        </div>
        <div class="row-status" data-target="ANTHROPIC_DEFAULT_HAIKU_MODEL" aria-live="polite"></div>
      </div>

      <div class="field model-field">
        <div class="model-field-row">
          <label for="ANTHROPIC_DEFAULT_SONNET_MODEL">{{defaultSonnetModel}}</label>
          <input type="text" id="ANTHROPIC_DEFAULT_SONNET_MODEL" value="{{ANTHROPIC_DEFAULT_SONNET_MODEL}}" />
          <div class="searchable-select" data-target="ANTHROPIC_DEFAULT_SONNET_MODEL">
            <input type="text" class="searchable-select-input" placeholder="{{selectModelPlaceholder}}" readonly />
            <div class="searchable-select-dropdown">
              <input type="text" class="searchable-select-search" placeholder="{{searchModels}}" />
              <div class="searchable-select-list"></div>
              <div class="searchable-select-empty">{{noModelsFound}}</div>
            </div>
          </div>
          <button type="button" class="btn-secondary model-speed-test-btn" data-target="ANTHROPIC_DEFAULT_SONNET_MODEL">{{modelSpeedTest}}</button>
          <label class="one-million-context-toggle"><input type="checkbox" id="ANTHROPIC_DEFAULT_SONNET_MODEL_ONE_MILLION_CONTEXT" {{ANTHROPIC_DEFAULT_SONNET_MODEL_ONE_MILLION_CONTEXT_CHECKED}} /> {{oneMillionContext}}</label>
        </div>
        <div class="row-status" data-target="ANTHROPIC_DEFAULT_SONNET_MODEL" aria-live="polite"></div>
      </div>

      <div class="field model-field">
        <div class="model-field-row">
          <label for="ANTHROPIC_DEFAULT_OPUS_MODEL">{{defaultOpusModel}}</label>
          <input type="text" id="ANTHROPIC_DEFAULT_OPUS_MODEL" value="{{ANTHROPIC_DEFAULT_OPUS_MODEL}}" />
          <div class="searchable-select" data-target="ANTHROPIC_DEFAULT_OPUS_MODEL">
            <input type="text" class="searchable-select-input" placeholder="{{selectModelPlaceholder}}" readonly />
            <div class="searchable-select-dropdown">
              <input type="text" class="searchable-select-search" placeholder="{{searchModels}}" />
              <div class="searchable-select-list"></div>
              <div class="searchable-select-empty">{{noModelsFound}}</div>
            </div>
          </div>
          <button type="button" class="btn-secondary model-speed-test-btn" data-target="ANTHROPIC_DEFAULT_OPUS_MODEL">{{modelSpeedTest}}</button>
          <label class="one-million-context-toggle"><input type="checkbox" id="ANTHROPIC_DEFAULT_OPUS_MODEL_ONE_MILLION_CONTEXT" {{ANTHROPIC_DEFAULT_OPUS_MODEL_ONE_MILLION_CONTEXT_CHECKED}} /> {{oneMillionContext}}</label>
        </div>
        <div class="row-status" data-target="ANTHROPIC_DEFAULT_OPUS_MODEL" aria-live="polite"></div>
      </div>

      <div class="field model-field">
        <div class="model-field-row">
          <label for="ANTHROPIC_DEFAULT_FABLE_MODEL">{{defaultFableModel}}</label>
          <input type="text" id="ANTHROPIC_DEFAULT_FABLE_MODEL" value="{{ANTHROPIC_DEFAULT_FABLE_MODEL}}" />
          <div class="searchable-select" data-target="ANTHROPIC_DEFAULT_FABLE_MODEL">
            <input type="text" class="searchable-select-input" placeholder="{{selectModelPlaceholder}}" readonly />
            <div class="searchable-select-dropdown">
              <input type="text" class="searchable-select-search" placeholder="{{searchModels}}" />
              <div class="searchable-select-list"></div>
              <div class="searchable-select-empty">{{noModelsFound}}</div>
            </div>
          </div>
          <button type="button" class="btn-secondary model-speed-test-btn" data-target="ANTHROPIC_DEFAULT_FABLE_MODEL">{{modelSpeedTest}}</button>
          <label class="one-million-context-toggle"><input type="checkbox" id="ANTHROPIC_DEFAULT_FABLE_MODEL_ONE_MILLION_CONTEXT" {{ANTHROPIC_DEFAULT_FABLE_MODEL_ONE_MILLION_CONTEXT_CHECKED}} /> {{oneMillionContext}}</label>
        </div>
        <div class="row-status" data-target="ANTHROPIC_DEFAULT_FABLE_MODEL" aria-live="polite"></div>
      </div>

      <div class="field model-field">
        <div class="model-field-row">
          <label for="ANTHROPIC_MODEL">{{fallbackModel}}</label>
          <input type="text" id="ANTHROPIC_MODEL" value="{{ANTHROPIC_MODEL}}" />
          <div class="searchable-select" data-target="ANTHROPIC_MODEL">
            <input type="text" class="searchable-select-input" placeholder="{{selectModelPlaceholder}}" readonly />
            <div class="searchable-select-dropdown">
              <input type="text" class="searchable-select-search" placeholder="{{searchModels}}" />
              <div class="searchable-select-list"></div>
              <div class="searchable-select-empty">{{noModelsFound}}</div>
            </div>
          </div>
          <button type="button" class="btn-secondary model-speed-test-btn" data-target="ANTHROPIC_MODEL">{{modelSpeedTest}}</button>
          <label class="one-million-context-toggle"><input type="checkbox" id="ANTHROPIC_MODEL_ONE_MILLION_CONTEXT" {{ANTHROPIC_MODEL_ONE_MILLION_CONTEXT_CHECKED}} /> {{oneMillionContext}}</label>
        </div>
        <div class="row-status" data-target="ANTHROPIC_MODEL" aria-live="polite"></div>
      </div>
    </div>
  </div>


  <div class="card" data-default-collapsed>
    <div class="card-header"><span class="card-title">{{extraSettings}}</span><svg class="card-chevron" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>
    <div class="card-body">
      <div class="sub-section" id="esTreeSubSection">
        <div class="sub-section-header">
          <span class="sub-section-title">{{treeView}}</span>
          <svg class="card-chevron" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        </div>
        <div class="sub-section-body">
          <div class="extra-settings-tree" id="extraSettingsTree"></div>
          <button type="button" class="btn-secondary" id="addExtraSettingBtn">{{addSetting}}</button>
        </div>
      </div>
      <div class="sub-section" id="esJsonSubSection" data-default-collapsed>
        <div class="sub-section-header">
          <span class="sub-section-title">{{esJsonLabel}}</span>
          <div class="es-json-controls">
            <span class="es-json-status" id="esJsonStatus" aria-live="polite"></span>
            <button type="button" class="btn-icon" id="esFullscreenBtn" title="Fullscreen toggle">
              <svg class="icon-maximize" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
              <svg class="icon-minimize" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14h6v6M20 10h-6V4M14 10l7-7M10 14l-7 7"/></svg>
            </button>
          </div>
          <svg class="card-chevron" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        </div>
        <div class="sub-section-body">
          <textarea id="esJson" class="es-json" spellcheck="false" placeholder="{}"></textarea>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><span class="card-title">{{profileName}}</span><svg class="card-chevron" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2"/></svg></div>
    <div class="card-body">
      <div class="field">
        <label for="effort">{{effortLabel}}</label>
        <select id="effort" class="effort-select">
          <option value="low" {{EFFORT_LOW_SELECTED}}>low</option>
          <option value="medium" {{EFFORT_MEDIUM_SELECTED}}>medium</option>
          <option value="high" {{EFFORT_HIGH_SELECTED}}>high</option>
          <option value="xhigh" {{EFFORT_XHIGH_SELECTED}}>xhigh</option>
          <option value="max" {{EFFORT_MAX_SELECTED}}>max</option>
        </select>
      </div>
      <div class="field">
        <input type="text" id="name" value="{{name}}" placeholder="{{nameHint}}" />
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-primary" id="saveBtn">{{save}}</button>
    <button class="btn-cancel" id="cancelBtn">{{cancel}}</button>
  </div>

  <script nonce="{{nonce}}" src="{{jsUri}}"></script>
</body>
</html>
