<!DOCTYPE html>
<html lang="{{htmlLang}}">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'nonce-{{nonce}}' {{cssSrc}}; script-src 'nonce-{{nonce}}';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <link rel="stylesheet" nonce="{{nonce}}" href="{{cssUri}}">
</head>
<body data-unnamed="{{unnamed}}">
  <h2>{{heading}}</h2>

  <div class="section-title">{{environmentVariables}}</div>

  <div class="field">
    <label for="ANTHROPIC_AUTH_TOKEN">Auth Token</label>
    <div class="input-wrapper">
      <input type="password" id="ANTHROPIC_AUTH_TOKEN" value="{{ANTHROPIC_AUTH_TOKEN}}" />
      <button class="eye-toggle" id="toggleAuthToken" title="{{showHide}}">
        <svg class="icon-eye" viewBox="0 0 24 24" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        <svg class="icon-eye-off" viewBox="0 0 24 24" width="16" height="16"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.19a3 3 0 1 1-4.24-4.24" fill="none" stroke="currentColor" stroke-width="2"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2"/></svg>
      </button>
    </div>
  </div>

  <div class="field">
    <label for="ANTHROPIC_BASE_URL">Base URL</label>
    <input type="text" id="ANTHROPIC_BASE_URL" value="{{ANTHROPIC_BASE_URL}}" />
  </div>

  <div class="field">
    <label for="ANTHROPIC_DEFAULT_HAIKU_MODEL">Default Haiku Model</label>
    <input type="text" id="ANTHROPIC_DEFAULT_HAIKU_MODEL" value="{{ANTHROPIC_DEFAULT_HAIKU_MODEL}}" />
  </div>

  <div class="field">
    <label for="ANTHROPIC_DEFAULT_OPUS_MODEL">Default Opus Model</label>
    <input type="text" id="ANTHROPIC_DEFAULT_OPUS_MODEL" value="{{ANTHROPIC_DEFAULT_OPUS_MODEL}}" />
  </div>

  <div class="field">
    <label for="ANTHROPIC_DEFAULT_SONNET_MODEL">Default Sonnet Model</label>
    <input type="text" id="ANTHROPIC_DEFAULT_SONNET_MODEL" value="{{ANTHROPIC_DEFAULT_SONNET_MODEL}}" />
  </div>

  <div class="field">
    <label for="ANTHROPIC_MODEL">Anthropic Model</label>
    <input type="text" id="ANTHROPIC_MODEL" value="{{ANTHROPIC_MODEL}}" />
  </div>

  <div class="field">
    <label for="model">Model</label>
    <input type="text" id="model" value="{{model}}" />
  </div>

  <div class="field">
    <label for="name">{{profileName}}</label>
    <input type="text" id="name" value="{{name}}" />
    <div class="field-hint">{{nameHint}}</div>
  </div>

  <div class="actions">
    <button class="btn-primary" id="saveBtn">{{save}}</button>
    <button class="btn-cancel" id="cancelBtn">{{cancel}}</button>
  </div>

  <script nonce="{{nonce}}" src="{{jsUri}}"></script>
</body>
</html>
